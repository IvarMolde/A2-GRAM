<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tindergram - A2 grammatikk</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --surface: #fff;
      --text: #15212b;
      --muted: #46586a;
      --primary: #0b5d88;
      --primary-dark: #094564;
      --border: #d3dee9;
      --ok: #0f7c43;
      --warn: #8d4f00;
      --focus: #1c7ed6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    .skip { position: absolute; left: .5rem; top: -100%; background: #fff; color: #000; border: 2px solid #000; padding: .6rem; z-index: 1000; }
    .skip:focus { top: .5rem; }
    :focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }
    header { background: linear-gradient(90deg, #0b4f72, #0b5d88); color: #fff; padding: 1rem; }
    .wrap { width: min(1100px, 100%); margin: 0 auto; }
    h1 { margin: 0; font-size: clamp(1.4rem, 5vw, 2rem); }
    .sub { margin: .3rem 0 0; color: #e7f1f9; }
    .tabs { margin-top: .8rem; display: flex; flex-wrap: wrap; gap: .5rem; }
    .tab { min-height: 44px; border: 2px solid #cfe4f0; border-radius: .7rem; background: #fff; color: #11384e; font-weight: 700; padding: .55rem .8rem; cursor: pointer; }
    .tab[aria-selected="true"] { background: var(--primary); color: #fff; border-color: var(--primary); }
    main { padding: .55rem; }
    footer { text-align: center; color: var(--muted); font-size: .86rem; padding: .65rem 1rem .95rem; }
    .grid { width: min(900px, 100%); margin: 0 auto; display: grid; gap: .5rem; grid-template-columns: 1fr; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: .78rem; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .rule-card { position: relative; }
    .card-heart {
      position: absolute;
      right: 1rem;
      top: 1rem;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: #fff;
      color: #a11b4b;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
    }
    .card-heart.active {
      background: #ffe8f1;
      border-color: #d86a93;
    }
    .title { margin: .1rem 0 .45rem; font-size: clamp(1.02rem, 2.7vw, 1.4rem); }
    .muted { color: var(--muted); font-size: .9rem; }
    .chips { display: flex; flex-wrap: wrap; gap: .34rem; margin-bottom: .45rem; }
    .chip { border-radius: 99px; padding: .3rem .65rem; background: #eef4fa; border: 1px solid #d8e3ec; font-size: .85rem; }
    .box { border-radius: .7rem; border: 1px solid #d8e7f3; background: #f8fbff; padding: .52rem; margin-top: .45rem; }
    .warn { border-left: 4px solid var(--warn); background: #fff8ea; border-radius: .5rem; padding: .5rem; margin-top: .45rem; }
    .ok { border-left: 4px solid var(--ok); background: #edf8f2; border-radius: .5rem; padding: .5rem; margin-top: .35rem; }
    .actions { display: grid; gap: .42rem; grid-template-columns: repeat(2, minmax(0,1fr)); margin-top: .6rem; }
    .actions3 { display: grid; gap: .42rem; grid-template-columns: repeat(3, minmax(0,1fr)); margin-top: .6rem; }
    button.btn { min-height: 44px; border-radius: .7rem; border: 2px solid var(--border); background: #fff; color: #17364b; font-weight: 700; cursor: pointer; }
    button.btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.btn.primary:hover { background: var(--primary-dark); }
    .list { list-style: none; padding: 0; margin: .7rem 0 0; display: grid; gap: .55rem; }
    .list li { border: 1px solid var(--border); border-radius: .7rem; padding: .6rem; }
    .row { display: flex; gap: .5rem; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .progress-wrap { border: 1px solid var(--border); border-radius: .8rem; background: #fff; padding: .5rem .55rem; position: sticky; top: .3rem; z-index: 3; }
    .progress-head { display: flex; justify-content: space-between; align-items: center; gap: .5rem; font-size: .9rem; color: var(--muted); }
    .progress-track { margin-top: .45rem; height: 10px; border-radius: 999px; background: #e6eef5; overflow: hidden; }
    .progress-stack { display: flex; height: 100%; width: 100%; }
    .progress-fill-ok { height: 100%; width: 0%; background: #1f9d55; transition: width .2s ease; }
    .progress-fill-bad { height: 100%; width: 0%; background: #d64545; transition: width .2s ease; }
    .progress-legend { display: flex; justify-content: space-between; align-items: center; gap: .6rem; margin-top: .45rem; font-size: .88rem; color: var(--muted); flex-wrap: wrap; }
    .legend-ok { color: #166534; font-weight: 700; }
    .legend-bad { color: #991b1b; font-weight: 700; }
    .status { margin-top: .8rem; border-radius: .6rem; border: 1px solid #b8d9ea; background: #eef8ff; color: #0c4b70; min-height: 44px; padding: .55rem; }
    .quiz-result-banner {
      margin-top: .45rem;
      border-radius: .6rem;
      padding: .45rem .6rem;
      font-weight: 700;
      font-size: .92rem;
      border: 1px solid transparent;
    }
    .quiz-result-banner.ok {
      background: #e9f8ef;
      border-color: #82d39d;
      color: #166534;
    }
    .quiz-result-banner.bad {
      background: #fdecec;
      border-color: #ef9a9a;
      color: #991b1b;
    }
    .sr-only { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    .word-bank { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .6rem; }
    .word-option { min-height: 44px; padding: .4rem .8rem; border-radius: 999px; border: 2px solid var(--border); background: #fff; color: #17364b; font-weight: 700; cursor: pointer; }
    .word-option:hover { border-color: #7ea7bf; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }
    @media (min-width: 768px) {
      main { padding: 1rem; }
      footer { font-size: .9rem; padding: .8rem 1rem 1.2rem; }
      .grid { gap: .75rem; }
      .card { padding: 1rem; }
      .title { margin: .2rem 0 .6rem; font-size: clamp(1.1rem, 2.8vw, 1.45rem); }
      .muted { font-size: .95rem; }
      .chips { gap: .45rem; margin-bottom: .7rem; }
      .box { padding: .7rem; margin-top: .7rem; }
      .warn { padding: .65rem; margin-top: .7rem; }
      .ok { padding: .65rem; margin-top: .5rem; }
      .actions { gap: .55rem; margin-top: .85rem; }
      .actions3 { gap: .55rem; margin-top: .85rem; }
      .progress-wrap { position: static; padding: .65rem; }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip">Hopp til innhold</a>
  <div class="sr-only" id="srAnnouncer" aria-live="polite"></div>
  <header>
    <div class="wrap">
      <h1>Tindergram</h1>
      <p class="sub">Grammatikkap på bokmål for voksne. Norsknivå A2.</p>
      <nav id="tabs" class="tabs" aria-label="Sider" role="tablist"></nav>
    </div>
  </header>
  <main id="main" tabindex="-1">
    <div class="grid">
      <section class="progress-wrap" id="progressPanel" aria-live="polite"></section>
      <section id="mainPanel" class="card" aria-live="polite"></section>
    </div>
  </main>
  <footer>© Laget av Ivar Øverland</footer>

  <script>
    const TABS = [
      { id: "learn", label: "Sveip" },
      { id: "quiz", label: "Quiz" },
      { id: "liked", label: "Favoritter" },
    ];
    const STORE = "tindergram-a2-v1";
    const RULES = [
      { id: 1, t: "Helsetning (V2)", r: "I helsetning står verbet på plass 2.", ex: ["Jeg bor i Oslo.", "Vi lærer norsk."], m: "Jeg i Oslo bor.", c: "Jeg bor i Oslo." },
      { id: 2, t: "Inversjon", r: "Når tid/sted står først, kommer verbet før subjektet.", ex: ["I dag jobber jeg hjemme.", "På mandag skal vi ha prøve."], m: "I dag jeg jobber hjemme.", c: "I dag jobber jeg hjemme." },
      { id: 3, t: "Ja/nei-spørsmål", r: "I ja/nei-spørsmål står verbet først.", ex: ["Bor du i Norge?", "Kommer han i morgen?"], m: "Du bor i Norge?", c: "Bor du i Norge?" },
      { id: 4, t: "Spørreord", r: "Etter spørreord kommer verbet før subjektet.", ex: ["Hvor bor du?", "Når starter kurset?"], m: "Hvor du bor?", c: "Hvor bor du?" },
      { id: 5, t: "Negasjon i helsetning", r: "Ikke står vanligvis etter verbet.", ex: ["Jeg kommer ikke i dag.", "Hun snakker ikke engelsk."], m: "Jeg ikke kommer i dag.", c: "Jeg kommer ikke i dag." },
      { id: 6, t: "Negasjon i leddsetning", r: "I leddsetninger er ikke noen ganger før verbet.", ex: ["Jeg er lei meg for at jeg ikke kommer.", "Han er hjemme fordi han ikke er frisk."], m: "Jeg vet at han ikke kommer.", c: "Jeg vet at han kommerikke." },
      { id: 7, t: "Ubestemt entall", r: "Bruk en/ei/et når det er ny informasjon.", ex: ["Jeg har en bil.", "Hun kjøper et brød."], m: "Jeg har bil.", c: "Jeg har en bil." },
      { id: 8, t: "Bestemt entall", r: "Bestemt form får -en/-a/-et.", ex: ["Bilen er ny.", "Huset er stort."], m: "Bil er ny.", c: "Bilen er ny." },
      { id: 9, t: "Ubestemt flertall", r: "Mange substantiv får -er i flertall.", ex: ["to biler", "mange elever"], m: "to bil", c: "to biler" },
      { id: 10, t: "Bestemt flertall", r: "Bestemt flertall er ofte -ene/-a.", ex: ["Bilene er dyre.", "Jentene kommer nå."], m: "Bilene er dyr.", c: "Bilene er dyre." },
      { id: 11, t: "Adjektiv med en-ord", r: "Adjektiv uten endelse i ubestemt entall.", ex: ["en stor bil", "en ny jakke"], m: "en stort bil", c: "en stor bil" },
      { id: 12, t: "Adjektiv med et-ord", r: "Adjektiv får -t med et-ord.", ex: ["et stort hus", "et fint bilde"], m: "et stor hus", c: "et stort hus" },
      { id: 13, t: "Adjektiv i flertall", r: "Adjektiv får ofte -e i flertall.", ex: ["store hus", "hyggelige mennesker"], m: "stor hus", c: "store hus" },
      { id: 14, t: "Adjektiv i bestemt form", r: "Bruk den/det/de + adjektiv med -e.", ex: ["den nye læreren", "det store huset"], m: "den ny læreren", c: "den nye læreren" },
      { id: 15, t: "Presens", r: "Presens uttrykker nåtid.", ex: ["Jeg jobber i en butikk.", "Hun leser hver kveld."], m: "Jeg jobb i butikk.", c: "Jeg jobber i en butikk." },
      { id: 16, t: "Preteritum", r: "Preteritum brukes ofte om avsluttet fortid.", ex: ["Jeg snakket med naboen i går.", "Vi kjøpte mat."], m: "Jeg snakker i går.", c: "Jeg snakket i går." },
      { id: 17, t: "Perfektum", r: "Perfektum er har + partisipp.", ex: ["Jeg har bodd i Norge i to år.", "Hun har lest boka."], m: "Jeg har bo i Norge.", c: "Jeg har bodd i Norge." },
      { id: 18, t: "Perfektum med tidsord", r: "Bruk gjerne allerede/ennå.", ex: ["Jeg har allerede spist.", "Vi har ikke gjort leksa ennå."], m: "Jeg spiste allerede.", c: "Jeg har allerede spist." },
      { id: 19, t: "Modalverb kan", r: "Etter modalverbet kan står infinitiv uten å.", ex: ["Jeg kan svømme.", "Hun kan snakke norsk."], m: "Jeg kan å svømme.", c: "Jeg kan svømme." },
      { id: 20, t: "Modalverb må", r: "Modalverbet må uttrykker plikt/nødvendighet.", ex: ["Jeg må gå nå.", "Du må komme presis."], m: "Du må å komme.", c: "Du må komme." },
      { id: 21, t: "Modalverb vil", r: "Modalverbet vil uttrykker ønske/fremtid.", ex: ["Jeg vil lære mer norsk.", "Vi vil reise i sommer."], m: "Jeg vil å lære.", c: "Jeg vil lære." },
      { id: 22, t: "Modalverb skal", r: "Modalverbet skal brukes om planer.", ex: ["Jeg skal i et møte snart.", "Barna skal legge seg tidlig i kveld."], m: "Jeg skal å møte.", c: "Jeg skal møte." },
      { id: 23, t: "Infinitiv med å", r: "Mange verb tar å + infinitiv.", ex: ["Jeg liker å lese.", "Det er viktig å sove nok."], m: "Jeg liker lese.", c: "Jeg liker å lese." },
      { id: 24, t: "Ingen å etter modalverb", r: "Etter modalverbene kan/må/vil/skal bruker vi ikke å.", ex: ["Hun må jobbe i kveld.", "Vi skal reise i morgen."], m: "Hun må å jobbe.", c: "Hun må jobbe." },
      { id: 25, t: "Subjektpronomen", r: "Jeg, du, han, hun, vi, dere, de brukes som subjekt.", ex: ["Jeg bor her.", "De kommer snart."], m: "Meg bor her.", c: "Jeg bor her." },
      { id: 26, t: "Objektpronomen", r: "Meg, deg, ham/han, henne, oss, dere, dem brukes som objekt.", ex: ["Kan du hjelpe meg?", "Læreren ser dem."], m: "Kan du hjelpe jeg?", c: "Kan du hjelpe meg?" },
      { id: 27, t: "Eiendomsord etter substantiv", r: "Vanlig mønster: bilen min, boka di.", ex: ["bilen min", "barna våre"], m: "bil min", c: "bilen min" },
      { id: 28, t: "Eiendomsord foran substantiv", r: "Foran substantiv bruker vi ubestemt form.", ex: ["min bil", "vårt hus"], m: "min bilen", c: "min bil" },
      { id: 29, t: "Preposisjon i/på", r: "I: by/land/inne. På: flate/noen steder.", ex: ["Jeg bor i Norge.", "Boka ligger på bordet."], m: "Boka ligger i bordet.", c: "Boka ligger på bordet." },
      { id: 30, t: "Preposisjon til/fra", r: "Til viser mål, fra viser start.", ex: ["Vi reiser til Trondheim.", "Hun kommer fra Polen."], m: "Hun kommer til Polen.", c: "Hun kommer fra Polen." },
      { id: 31, t: "Tid: i går/i dag/i morgen", r: "Bruk riktig tidsord i setningen.", ex: ["Jeg jobbet i går.", "Vi skal trene i morgen."], m: "Jeg jobbet i morgen.", c: "Jeg jobbet i går." },
      { id: 32, t: "Klokkeslett", r: "Bruk klokka + tid.", ex: ["Møtet starter klokka åtte.", "Bussen går klokka halv ni."], m: "Møtet starter åtte klokke.", c: "Møtet starter klokka åtte." },
      { id: 33, t: "Leddsetning med fordi", r: "Fordi-setninger har leddsetningsordstilling.", ex: ["Jeg er hjemme fordi jeg ikke er frisk.", "Han kommer ikke fordi han ikke har tid."], m: "fordi jeg er ikke frisk", c: "fordi jeg ikke er frisk" },
      { id: 34, t: "Leddsetning med at", r: "At-setninger følger leddsetningsordstilling.", ex: ["Jeg tror at hun ikke kommer i dag.", "Vi vet at de ikke bor her."], m: "at hun kommer ikke", c: "at hun ikke kommer" },
      { id: 35, t: "Leddsetning med når", r: "Når brukes om tid.", ex: ["Jeg spiser når jeg kommer hjem.", "Ring meg når du er ferdig."], m: "Når jeg kommer hjem, jeg spiser.", c: "Når jeg kommer hjem, spiser jeg." },
      { id: 36, t: "Bindeord", r: "Og, men og eller binder ord og setninger.", ex: ["Jeg vil gå tur, men det regner.", "Vil du ha te eller kaffe?"], m: "Jeg vil gå tur men, det regner.", c: "Jeg vil gå tur, men det regner." },
      { id: 37, t: "Det er / det blir", r: "Det er: nå. Det blir: endring/fremtid.", ex: ["Det er kaldt ute.", "Det blir varmt i morgen."], m: "Det blir kaldt i morgen.", c: "Det er kaldt nå." },
      { id: 38, t: "Sammenligning med enn", r: "Komparativ + enn.", ex: ["Kaffe er dyrere enn te.", "Norsk er lettere nå enn før."], m: "dyrere som te", c: "dyrere enn te" },
      { id: 39, t: "Gradbøying av adjektiv", r: "Positiv, komparativ, superlativ.", ex: ["stor - større - størst", "fin - finere - finest"], m: "mer stor", c: "større" },
      { id: 40, t: "Imperativ", r: "Imperativ brukes til oppfordring.", ex: ["Kom hit!", "Les teksten!"], m: "Du kom hit!", c: "Kom hit!" }
    ];

    const state = { tab: "learn", i: 0, hist: [], redo: [], msg: "Sveip eller bruk knappene.", quiz: { scope: "all", list: [], i: 0, score: 0, answered: {}, retried: {} }, user: {} };

    function user(id) { if (!state.user[id]) state.user[id] = { liked: false, d: null }; return state.user[id]; }
    function visible() { return RULES; }
    function cur() { const v = visible(); if (!v.length) return null; if (state.i < 0) state.i = 0; if (state.i > v.length - 1) state.i = v.length - 1; return v[state.i]; }
    function saveState() { localStorage.setItem(STORE, JSON.stringify({ user: state.user, i: state.i })); }
    function loadState() { try { const s = JSON.parse(localStorage.getItem(STORE) || "{}"); if (s.user) state.user = s.user; if (typeof s.i === "number") state.i = s.i; } catch (_) {} }
    function setMsg(m) { state.msg = m; render(); }

    function decide(id, d) { const p = { ...user(id) }; user(id).d = d; state.hist.push({ id, p }); state.redo = []; saveState(); setMsg(d === "kan" ? "Markert: Kan." : "Markert: Øv mer."); }
    function undo() { const x = state.hist.pop(); if (!x) return setMsg("Ingen handling å angre."); state.redo.push({ id: x.id, p: { ...user(x.id) } }); state.user[x.id] = x.p; saveState(); setMsg("Handling angret."); }
    function redo() { const x = state.redo.pop(); if (!x) return setMsg("Ingen handling å gjøre om."); state.hist.push({ id: x.id, p: { ...user(x.id) } }); state.user[x.id] = x.p; saveState(); setMsg("Handling gjort om."); }
    function tLike(id) { user(id).liked = !user(id).liked; saveState(); setMsg(user(id).liked ? "Hjertemerket." : "Fjernet fra favoritter."); }
    function nextCard() {
      if (state.i >= visible().length - 1) return setMsg("Du er på siste kort.");
      state.i += 1;
      saveState();
      setMsg("Sveip høyre: neste kort.");
    }
    function prevCard() {
      if (state.i <= 0) return setMsg("Du er på første kort.");
      state.i -= 1;
      saveState();
      setMsg("Sveip venstre: forrige kort.");
    }

    function opt(rule) { const p = [rule.c, rule.m, rule.ex[0]].filter((v, i, arr) => arr.indexOf(v) === i); const s = rule.id % p.length; return p.map((_, i) => p[(i + s) % p.length]); }
    function startQuiz(scope) {
      const base = scope === "needs" ? RULES.filter((r) => user(r.id).d === "ov") : RULES.slice();
      const src = base.length ? base : RULES.slice();
      state.quiz = {
        scope,
        list: src.map((r) => buildQuizItem(r)),
        i: 0,
        score: 0,
        answered: {},
        retried: {},
      };
    }
    function getFillTarget(rule) {
      const mistake = rule.m.replace(/[.,!?]/g, "").split(/\s+/);
      const correct = rule.c.replace(/[.,!?]/g, "").split(/\s+/);
      for (let i = 0; i < Math.min(mistake.length, correct.length); i += 1) {
        if (mistake[i] !== correct[i] && correct[i].length > 1) return correct[i];
      }
      return correct[correct.length - 1] || correct[0] || "";
    }
    function fillPrompt(rule, target) {
      const escaped = target.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(`\\b${escaped}\\b`, "i");
      return rule.c.replace(regex, "____");
    }
    function buildFillOptions(rule, target) {
      const clean = (text) => text.replace(/[.,!?;:()]/g, "").toLowerCase().split(/\s+/).filter(Boolean);
      const correctWords = clean(rule.c);
      const mistakeWords = clean(rule.m);
      const distractors = new Set();
      for (let i = 0; i < Math.min(correctWords.length, mistakeWords.length); i += 1) {
        if (correctWords[i] !== mistakeWords[i] && mistakeWords[i].length > 1) distractors.add(mistakeWords[i]);
      }
      for (const w of mistakeWords) {
        if (w !== target.toLowerCase() && w.length > 2) distractors.add(w);
        if (distractors.size >= 3) break;
      }
      for (const w of correctWords) {
        if (w !== target.toLowerCase() && w.length > 2) distractors.add(w);
        if (distractors.size >= 3) break;
      }
      const options = [target, ...Array.from(distractors).slice(0, 3)];
      while (options.length < 4) options.push(target);
      const unique = [...new Set(options)];
      const seed = rule.id % unique.length;
      return unique.map((_, i) => unique[(i + seed) % unique.length]);
    }
    function buildQuizItem(rule) {
      const type = rule.id % 2 === 0 ? "fill" : "choice";
      if (type === "fill") {
        const target = getFillTarget(rule);
        return {
          qid: `r${rule.id}`,
          id: rule.id,
          type,
          p: `Fyll inn riktig ord (${rule.t})`,
          c: target,
          sentence: fillPrompt(rule, target),
          options: buildFillOptions(rule, target),
          e: rule.r
        };
      }
      return {
        qid: `r${rule.id}`,
        id: rule.id,
        type,
        p: `Velg riktig setning (${rule.t})`,
        c: rule.c,
        o: opt(rule),
        e: rule.r
      };
    }
    function sum() { return RULES.reduce((a, r) => { const u = user(r.id); if (u.liked) a.liked++; if (u.d === "kan") a.kan++; if (u.d === "ov") a.ov++; return a; }, { liked: 0, kan: 0, ov: 0 }); }
    function progress() {
      const s = sum();
      const total = RULES.length;
      const done = s.kan + s.ov;
      const pct = Math.round((done / total) * 100);
      const pctOk = Math.round((s.kan / total) * 100);
      const pctBad = Math.round((s.ov / total) * 100);
      return { ...s, total, done, pct, pctOk, pctBad };
    }
    function openFavorite(ruleId) {
      const idx = visible().findIndex((r) => r.id === ruleId);
      if (idx < 0) return;
      state.i = idx;
      state.tab = "learn";
      setMsg(`Åpnet favorittkort ${ruleId}.`);
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = TABS.map((t) => `<button class="tab" role="tab" aria-selected="${state.tab === t.id}" data-id="${t.id}">${t.label}</button>`).join("");
      tabs.querySelectorAll("button").forEach((b) => b.addEventListener("click", () => { state.tab = b.dataset.id; render(); }));
    }
    function learnHTML(r) {
      if (!r) return `<h2 class="title">Ingen regler</h2><p class="muted">Ingen regler tilgjengelig.</p>`;
      const u = user(r.id);
      return `
        <button class="card-heart ${u.liked ? "active" : ""}" id="topLike" aria-label="${u.liked ? "Fjern fra favoritter" : "Lagre som favoritt"}" title="${u.liked ? "Fjern fra favoritter" : "Lagre som favoritt"}">${u.liked ? "♥" : "♡"}</button>
        <p class="muted">Kort ${state.i + 1} av ${visible().length} (totalt 40)</p>
        <h2 class="title">${r.id}. ${r.t}</h2>
        <div class="chips"><span class="chip">A2</span><span class="chip">CEFR</span><span class="chip">${u.d === "kan" ? "Kan" : u.d === "ov" ? "Øv mer" : "Ikke vurdert"}</span></div>
        <p>${r.r}</p>
        <div class="box"><strong>Eksempler</strong><ul>${r.ex.map((x) => `<li>${x}</li>`).join("")}</ul></div>
        <div class="warn"><strong>Vanlig feil:</strong> ${r.m}</div>
        <div class="ok"><strong>Riktig form:</strong> ${r.c}</div>
        <div class="actions3">
          <button class="btn" id="prev">Forrige</button><button class="btn" id="undo">Angre</button><button class="btn" id="next">Neste</button>
        </div>
        <div class="actions">
          <button class="btn" id="ov">Øv mer</button>
        </div>
        <p class="muted">Sveip venstre = neste kort. Sveip høyre = forrige kort.</p>
      `;
    }
    function quizHTML() {
      const q = state.quiz.list[state.quiz.i];
      if (!q) return `<h2 class="title">Quiz fullført</h2><p>Poeng: <strong>${state.quiz.score} av ${state.quiz.list.length}</strong></p><div class="actions"><button class="btn primary" id="restart">Start på nytt</button><button class="btn" id="needs">Bare Øv mer</button></div>`;
      const ans = state.quiz.answered[q.qid];
      const resultBanner = ans
        ? `<div class="quiz-result-banner ${ans.ok ? "ok" : "bad"}" role="status">${ans.ok ? "Riktig svar" : "Feil svar"}</div>`
        : `<div class="quiz-result-banner" style="background:#f3f7fb;border-color:#d7e5f1;color:#1f3f57;" role="status">Ikke svart ennå</div>`;
      return `
        <p class="muted">Spørsmål ${state.quiz.i + 1} av ${state.quiz.list.length}</p>
        <h2 class="title">Quizmodus</h2>
        ${resultBanner}
        <div class="chips"><span class="chip">${state.quiz.scope === "needs" ? "Øv mer-fokus" : "Alle regler"}</span><button class="btn" id="allQ">Alle regler</button><button class="btn" id="needsQ">Bare Øv mer</button></div>
        <p><strong>${q.p}</strong></p>
        ${q.type === "choice"
          ? `<div class="actions">${q.o.map((o, i) => `<button class="btn" data-o="${i}" ${ans ? "disabled" : ""}>${o}</button>`).join("")}</div>`
          : `<div class="box"><p class="muted">Setning:</p><p><strong>${q.sentence}</strong></p><p class="muted">Velg ordet som passer best i konteksten:</p><div class="word-bank">${q.options.map((opt, i) => `<button class="word-option" data-fo="${i}" ${ans ? "disabled" : ""}>${opt}</button>`).join("")}</div></div>`
        }
        <div class="status">${ans ? ans.msg : "Velg ett svar."}</div>
        <div class="actions"><button class="btn" id="qPrev" ${state.quiz.i === 0 ? "disabled" : ""}>Forrige</button><button class="btn primary" id="qNext">${state.quiz.i >= state.quiz.list.length - 1 ? "Vis resultat" : "Neste"}</button></div>
      `;
    }
    function listHTML(filter, title, txt, dAttr, btn) {
      const items = RULES.filter(filter);
      return `<h2 class="title">${title}</h2><p class="muted">${txt}</p><ul class="list">${items.map((r) => `<li><div class="row"><strong>${r.id}. ${r.t}</strong><button class="btn" ${dAttr}="${r.id}">${btn}</button></div><p class="muted">${r.r}</p></li>`).join("")}</ul>`;
    }
    function renderMain() {
      const m = document.getElementById("mainPanel");
      if (state.tab === "learn") { const r = cur(); m.classList.add("rule-card"); m.innerHTML = learnHTML(r); bindLearn(r); return; }
      m.classList.remove("rule-card");
      if (state.tab === "quiz") { m.innerHTML = quizHTML(); bindQuiz(); return; }
      if (state.tab === "liked") {
        m.innerHTML = listHTML((r) => user(r.id).liked, "Favoritter", "Klikk for å åpne kort du har markert med hjerte.", "data-openfav", "Åpne kort");
        m.querySelectorAll("[data-openfav]").forEach((b) => b.addEventListener("click", () => openFavorite(Number(b.dataset.openfav))));
      }
    }
    function bindLearn(r) {
      if (!r) return;
      const on = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener("click", fn); };
      on("ov", () => decide(r.id, "ov"));
      on("topLike", () => tLike(r.id));
      on("prev", prevCard); on("next", nextCard);
      on("undo", undo);
    }
    function bindQuiz() {
      const q = state.quiz.list[state.quiz.i];
      function handleAnswer(ok, rightValue) {
        if (ok) state.quiz.score += 1;
        state.quiz.answered[q.qid] = { ok, msg: ok ? `Riktig! ${q.e}` : `Ikke helt. Riktig svar: "${rightValue}". ${q.e}` };
        if (!ok && !state.quiz.retried[q.id]) {
          state.quiz.retried[q.id] = true;
          state.quiz.list.push({ ...q, qid: `${q.qid}-retry`, p: `${q.p} (ny sjanse)` });
        }
        render();
      }
      document.querySelectorAll("[data-o]").forEach((b) => b.addEventListener("click", () => {
        if (state.quiz.answered[q.qid]) return;
        const chosen = q.o[Number(b.dataset.o)];
        handleAnswer(chosen === q.c, q.c);
      }));
      document.querySelectorAll("[data-fo]").forEach((b) => b.addEventListener("click", () => {
        if (state.quiz.answered[q.qid]) return;
        const chosen = q.options[Number(b.dataset.fo)];
        handleAnswer(chosen.toLowerCase() === q.c.toLowerCase(), q.c);
      }));
      const prev = document.getElementById("qPrev"), next = document.getElementById("qNext");
      if (prev) prev.addEventListener("click", () => { state.quiz.i -= 1; render(); });
      if (next) next.addEventListener("click", () => { state.quiz.i += 1; render(); });
      const restart = document.getElementById("restart"), needs = document.getElementById("needs");
      if (restart) restart.addEventListener("click", () => { startQuiz(state.quiz.scope); render(); });
      if (needs) needs.addEventListener("click", () => { startQuiz("needs"); render(); });
      const allQ = document.getElementById("allQ"), needsQ = document.getElementById("needsQ");
      if (allQ) allQ.addEventListener("click", () => { startQuiz("all"); render(); });
      if (needsQ) needsQ.addEventListener("click", () => { startQuiz("needs"); render(); });
    }
    function renderProgress() {
      const p = progress();
      const panel = document.getElementById("progressPanel");
      panel.innerHTML = `<div class="progress-head"><strong>Progresjon</strong><span id="progressText">${p.done} / ${p.total} vurdert (${p.pct}%)</span></div><div class="progress-track"><div class="progress-stack"><div class="progress-fill-ok" style="width:${p.pctOk}%"></div><div class="progress-fill-bad" style="width:${p.pctBad}%"></div></div></div><div class="progress-legend"><span class="legend-ok">Riktig: ${p.kan}</span><span class="legend-bad">Feil: ${p.ov}</span><span>Favoritter: ${p.liked}</span></div><div class="status" role="status">${state.msg}</div>`;
      const announcer = document.getElementById("srAnnouncer");
      if (announcer) announcer.textContent = state.msg;
    }
    function render() { renderTabs(); renderMain(); renderProgress(); }

    document.addEventListener("keydown", (e) => {
      if (state.tab !== "learn") return;
      const r = cur(); if (!r) return;
      if (e.key === "ArrowLeft") nextCard();
      if (e.key === "ArrowRight") prevCard();
    });
    let sx = 0;
    document.addEventListener("touchstart", (e) => { sx = e.changedTouches[0].clientX; }, { passive: true });
    document.addEventListener("touchend", (e) => {
      if (state.tab !== "learn") return;
      const r = cur(); if (!r) return;
      const d = e.changedTouches[0].clientX - sx;
      if (Math.abs(d) < 50) return;
      if (d < 0) nextCard();
      if (d > 0) prevCard();
    }, { passive: true });

    loadState();
    startQuiz("all");
    render();
  </script>
</body>
</html>
